# Skip the pre-run dependency status check. It otherwise fails because the
# optional native build scripts below are not auto-approved; none are required
# at runtime (Prisma 7 uses the @prisma/adapter-pg JS driver, not the engine).
verifyDepsBeforeRun: false

allowBuilds:
  '@prisma/engines': false
  '@scarf/scarf': false
  argon2: false
  esbuild: false
  msgpackr-extract: false
  prisma: false
  unrs-resolver: false

# Security overrides — each entry notes the advisory it closes; remove once the
# parent dependency ships the patched version on its own.
overrides:
  # GHSA-72gw-mp4g-v24j (high): multer DoS via nested field names, pulled in
  # transitively by @nestjs/platform-express (fixed >=2.2.0).
  multer: ">=2.2.0"
